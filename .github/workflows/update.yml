name: Track Steam Updates

on:
  schedule:
    - cron: '0 9,12,15,18,21 * * MON-FRI'
      timezone: "America/Los_Angeles"
    - cron: '0 0,12 * * SAT,SUN'
      timezone: "America/Los_Angeles"
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update (pass "force" argument to update script)'
        required: false
        type: boolean
        default: false

concurrency:
  group: update
  cancel-in-progress: false

permissions:
  contents: write
  statuses: write

jobs:
  update:
    if: github.repository_owner == 'SteamTracking' || github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'current'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Node dependencies
        run: npm ci

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .support
            store.steampowered.com/ssr
            partner.steamgames.com/ssr
          key: cache-
          restore-keys: |
            cache-

      - name: Restore etags cache
        uses: actions/cache/restore@v5
        with:
          path: .support/etags.json
          key: etags-
          restore-keys: |
            etags-

      - name: Run update
        id: update
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          BEFORE=$(git rev-parse HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash update.sh ${{ inputs.force == true && 'force' || '' }}
          if [[ "$(git rev-parse HEAD)" != "$BEFORE" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set commit status
        if: always() && steps.update.outputs.changed == 'true'
        shell: bash
        run: |
          NEW_SHA=$(git rev-parse HEAD)

          if [[ "${{ job.status }}" == "success" ]]; then
            STATE="success"
          else
            STATE="failure"
          fi

          gh api "repos/${{ github.repository }}/statuses/$NEW_SHA" \
            -f state="$STATE" \
            -f target_url="$GITHUB_SERVER_URL/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="SteamTracking" \
            -f context="SteamTracking"
        env:
          GH_TOKEN: ${{ github.token }}


      - name: Save etags cache
        uses: actions/cache/save@v5
        with:
          path: .support/etags.json
          key: etags-${{ hashFiles('.support/etags.json') }}

      - name: Save cache
        uses: actions/cache/save@v5
        with:
          path: |
            .support
            store.steampowered.com/ssr
            partner.steamgames.com/ssr
            steamcommunity.com/ssr
          key: cache-${{ hashFiles('.support/**', '!.support/etags.json', 'store.steampowered.com/ssr/**', 'partner.steamgames.com/ssr/**', 'steamcommunity.com/ssr/**') }}

      - name: Dispatch to ValveProtobufs
        if: steps.update.outputs.changed == 'true' && env.GH_TOKEN != ''
        run: gh api repos/SteamTracking/Protobufs/dispatches -f event_type=sync
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
