name: Track Steam Updates

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update (pass "force" argument to update script)'
        required: false
        type: boolean
        default: false

concurrency:
  group: update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    if: github.repository_owner == 'SteamTracking'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Node dependencies
        run: npm ci

      - name: Cache .support
        uses: actions/cache@v5
        with:
          path: .support
          key: support-${{ hashFiles('.support/**') }}
          restore-keys: |
            support-

      - name: Cache SSR
        uses: actions/cache@v5
        with:
          path: store.steampowered.com/ssr
          key: ssr-${{ hashFiles('store.steampowered.com/ssr/**') }}
          restore-keys: |
            ssr-

      - name: Run update
        id: update
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          BEFORE=$(git rev-parse HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash update.sh ${{ inputs.force == true && 'force' || '' }}
          if [[ "$(git rev-parse HEAD)" != "$BEFORE" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch to ValveProtobufs
        if: steps.update.outputs.changed == 'true'
        run: gh api repos/SteamTracking/Protobufs/dispatches -f event_type=sync
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
